spring:
  datasource:
    url: jdbc:h2:mem:trading;MODE=PostgreSQL;DATABASE_TO_UPPER=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  h2:
    console:
      enabled: true
      path: /h2-console

trading:
  symbols:
    - BTC
    - ETH
    - TEST

logging:
  pattern:
    console: "%d{HH:mm:ss} [%X{traceId}] %-5level %logger{36} - %msg%n"
